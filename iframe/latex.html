<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<title>LaTeX</title>
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<script src="/iframe/js/tex-svg.js"></script>
	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			padding: 20px;
		}

		.input-group {
			display: flex;
			gap: 10px;
			margin-bottom: 20px;
		}

		#latexInput {
			flex: 1;
			padding: 12px;
			border: 2px solid #1890ff;
			border-radius: 6px;
			font-size: 14px;
		}

		button {
			padding: 12px 24px;
			background: #1890ff;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			transition: background 0.3s;
		}

		button:hover {
			background: #096dd9;
		}

		.preview-box {
			background: white;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.preview-title {
			font-size: 16px;
			color: #333;
			padding: 12px 20px;
			border-bottom: 1px solid #eee;
			flex-shrink: 0;
			background: inherit;
		}

		.preview-content {
			padding: 20px;
			min-height: 80px;
			max-height: 80px;
			overflow-y: auto;
			overflow-x: auto;
			background: inherit;
			flex: 1;
		}


		#previewSvg {
			padding: 10px;
			display: inline-block;
		}
	</style>
</head>
<body>

<!-- 输入框 + 按钮 -->
<div class="input-group">
	<input id="latexInput" placeholder="在此输入LaTeX表达式..." type="text">
	<button onclick="generateImage()">生成</button>
</div>

<!-- 实时预览区域 -->
<div class="preview-box">
	<div class="preview-title">预览</div>
	<div class="preview-content" id="previewSvg"></div>
</div>

<script>
	// 输入框与预览容器
	const latexInput = document.getElementById('latexInput');
	const previewDiv = document.getElementById('previewSvg');
	/**
	 * 实时渲染 LaTeX to SVG 预览
	 */
	latexInput.addEventListener('input', async () => {
		const latex = latexInput.value.trim();
		previewDiv.innerHTML = ''; // 清空旧内容
		if (!latex) return; // 空输入时不处理
		try {
			// 创建 span 包裹 LaTeX
			const node = document.createElement('span');
			node.innerHTML = `\\(${latex}\\)`;
			previewDiv.appendChild(node);

			// 调用 MathJax 渲染
			await MathJax.typesetPromise([node]);

			// 提取 SVG 并替换展示
			const svg = node.querySelector('svg');
			if (svg) {
				previewDiv.innerHTML = '';
				previewDiv.appendChild(svg.cloneNode(true));
			}
		} catch (err) {
			eda.sys_Message.showToastMessage('预览渲染失败:' + err, 'error');
		}
	});

	/** 用于防止重复注册鼠标事件的唯一 ID */
	const MOUSE_EVENT_ID = 'docs-tools-latex-place';

	/**
	 * 点击按钮：生成多边形数据，隐藏窗口，等待用户在画布上点击放置
	 */
	async function generateImage() {
		const svg = previewDiv.querySelector('svg');
		if (!svg) {
			eda.sys_Message.showToastMessage('请先输入有效的LaTeX表达式', 'warn');
			return;
		}
		try {
			// 将 SVG 序列化为字符串
			const svgText = new XMLSerializer().serializeToString(svg);
			const blob = new Blob([svgText], { type: 'image/svg+xml' });
			const url = URL.createObjectURL(blob);
			// 加载为 Image 对象
			const img = new Image();
			img.onload = async () => {
				// 绘制到 Canvas
				const canvas = document.createElement('canvas');
				canvas.width = img.width;
				canvas.height = img.height;
				const ctx = canvas.getContext('2d');
				ctx.drawImage(img, 0, 0);
				// 转换为 PNG Blob
				canvas.toBlob(async (pngBlob) => {
					// 调用 PCB_MathPolygon API 生成多边形
					const polygon = await eda.pcb_MathPolygon.convertImageToComplexPolygon(
						pngBlob,
						img.naturalWidth,
						img.naturalHeight,
						0.28,
					);
					const width = img.naturalWidth;
					const height = img.naturalHeight;

					// 隐藏 iframe，让用户可以点击画布
					await eda.sys_IFrame.hideIFrame();
					eda.sys_Message.showToastMessage('请在画布上点击要放置的位置', 'info');

					// 注册一次性鼠标事件，等待用户点击
					if (eda.pcb_Event.isEventListenerAlreadyExist(MOUSE_EVENT_ID)) {
						eda.pcb_Event.removeEventListener(MOUSE_EVENT_ID);
					}
					eda.pcb_Event.addMouseEventListener(
						MOUSE_EVENT_ID,
						'all',
						async () => {
							try {
								const pos = await eda.pcb_SelectControl.getCurrentMousePosition();
								if (!pos) {
									eda.sys_Message.showToastMessage('无法获取鼠标位置', 'error');
									await eda.sys_IFrame.showIFrame();
									return;
								}
								await eda.pcb_PrimitiveImage.create(
									pos.x, pos.y,
									polygon,
									EPCB_LayerId.DOCUMENT,
									width,
									height,
								);
								eda.sys_Message.showToastMessage('放置成功', 'success');
							} catch (err) {
								eda.sys_Message.showToastMessage('图元创建异常:' + err, 'error');
							}
							// 放置完成后重新显示 iframe
							await eda.sys_IFrame.showIFrame();
						},
						true, // onlyOnce
					);
				}, 'image/png');
			};
			img.src = url;
		} catch (err) {
			eda.sys_Message.showToastMessage('生成失败:' + err, 'error');
			await eda.sys_IFrame.showIFrame();
		}
	}
</script>
</body>
</html>
