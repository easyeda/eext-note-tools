<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<title>Markdown</title>
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<script src="/iframe/js/marked.umd.js"></script>
	<script src="/iframe/js/html2canvas.min.js"></script>
	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			padding: 20px;
		}

		.container {
			display: flex;
			gap: 20px; /* 左右间隔 */
			min-width: 0; /* 防止 flex 子项溢出 */
		}

		#mdInput {
			flex: 1;
			min-width: 40%; /* 左边至少占40% */
			height: 310px;
			padding: 12px;
			border: 2px solid #1890ff;
			border-radius: 6px;
			font-size: 14px;
			resize: none; /* 禁止拉伸 */
		}

		.preview-box {
			flex: 1;
			min-width: 0;
			background: white;
			border-radius: 8px;
			padding: 20px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			display: flex;
			flex-direction: column;
		}

		.preview-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 12px;
		}

		.preview-title {
			font-size: 16px;
			color: #333;
		}

		#previewHtml {
			border: 1px solid #eee;
			padding: 10px;
			min-height: 100px;
			max-height: 220px;
			overflow-y: auto; /* 纵向滚动条 */
			overflow-x: auto; /* 横向滚动条 */
			background: #fafafa;
			flex: 1;
			white-space: normal;
			word-wrap: break-word;
		}

		/* 代码块样式 */
		#previewHtml pre {
			white-space: pre;
			overflow-x: auto;
			background: #f5f5f5;
			padding: 8px;
			border-radius: 4px;
		}

		button {
			padding: 8px 16px;
			background: #1890ff;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			transition: background 0.3s;
		}

		button:hover {
			background: #096dd9;
		}
	</style>
</head>
<body>

<div class="container">
	<!-- 左侧 Markdown 输入 -->
	<textarea id="mdInput" placeholder="在此输入Markdown文本..."></textarea>

	<!-- 右侧预览 + 导出按钮 -->
	<div class="preview-box">
		<div class="preview-header">
			<div class="preview-title">预览</div>
			<button onclick="generateImage()">生成</button>
		</div>
		<div id="previewHtml"></div>
	</div>
</div>

<script>
	const mdInput = document.getElementById('mdInput');
	const previewDiv = document.getElementById('previewHtml');

	/**
	 * 实时预览 Markdown to HTML
	 */
	mdInput.addEventListener('input', () => {
		const mdText = mdInput.value;
		try {
			previewDiv.innerHTML = marked.parse(mdText || '');
		} catch (error) {
//			console.error('Markdown解析出错:', error);
			eda.sys_Message.showToastMessage('Markdown解析出错:' + error, 'error');
		}
	});

	/**
	 * 点击按钮 to 导出 PNG to 调用 PCB API
	 */
	async function generateImage() {
		if (!previewDiv.innerHTML.trim()) {
			eda.sys_Message.showToastMessage('请先输入有效的Markdown语法', 'warn');
			return;
		}
		try {
			// 克隆一个隐藏副本，用于渲染（避免截到滚动条）
			const clone = previewDiv.cloneNode(true);
			clone.style.overflow = 'visible';
			clone.style.maxHeight = 'none';
			clone.style.position = 'absolute';
			clone.style.left = '-9999px'; // 屏幕外
			document.body.appendChild(clone);
			// 将 DOM 转换为 Canvas
			const canvas = await html2canvas(clone, { backgroundColor: null });
			document.body.removeChild(clone); // 清理副本
			// 转换为 PNG Blob
			canvas.toBlob(async (pngBlob) => {
//				console.log("生成 PNG Blob:", pngBlob);
				// 调用 PCB_MathPolygon API（在 EDA 环境下才有效）
				const polygon = await eda.pcb_MathPolygon.convertImageToComplexPolygon(
					pngBlob,
					canvas.width,
					canvas.height,
					0.45,
				);
//				console.log('生成的多边形对象:', polygon);
				// 创建 PCB 图元

				try {
					const imagePrimitive = await eda.pcb_PrimitiveImage.create(
						0, 0,
						polygon,
						EPCB_LayerId.DOCUMENT,
						canvas.width,
						canvas.height,
					);
//					console.log('创建的图像图元:', imagePrimitive);
				} catch (err) {
					eda.sys_Message.showToastMessage('图元创建异常:' + err, 'error');
//					console.error('图元创建异常:', err);
				}
			}, 'image/png');
			eda.sys_Message.showToastMessage('生成成功，位于文档层坐标原点处', 'success');
		} catch (err) {
			eda.sys_Message.showToastMessage('生成失败:' + err, 'error');
//			console.error('生成失败:', err);
		}
	}
</script>
</body>
</html>
