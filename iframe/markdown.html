<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<title>Markdown</title>
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<script src="/iframe/js/marked.umd.js"></script>
	<script src="/iframe/js/html2canvas.min.js"></script>
	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			padding: 20px;
		}

		.container {
			display: flex;
			gap: 20px;
			min-width: 0;
		}

		#mdInput {
			flex: 1;
			min-width: 40%;
			height: 310px;
			padding: 12px;
			border: 2px solid #1890ff;
			border-radius: 6px;
			font-size: 14px;
			resize: none;
		}

		.preview-box {
			flex: 1;
			min-width: 0;
			background: white;
			border-radius: 8px;
			padding: 20px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			display: flex;
			flex-direction: column;
		}

		.preview-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 12px;
		}

		.preview-title {
			font-size: 16px;
			color: #333;
		}

		#previewHtml {
			border: 1px solid #eee;
			padding: 10px;
			min-height: 100px;
			max-height: 220px;
			overflow-y: auto;
			overflow-x: auto;
			background: #fafafa;
			flex: 1;
			white-space: normal;
			word-wrap: break-word;
		}

		/* 代码块样式 */
		#previewHtml pre {
			white-space: pre;
			overflow-x: auto;
			background: #f5f5f5;
			padding: 8px;
			border-radius: 4px;
		}

		button {
			padding: 8px 16px;
			background: #1890ff;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			transition: background 0.3s;
		}

		button:hover {
			background: #096dd9;
		}
	</style>
</head>
<body>

<div class="container">
	<!-- 左侧 Markdown 输入 -->
	<textarea id="mdInput" placeholder="在此输入Markdown文本..."></textarea>

	<!-- 右侧预览 + 导出按钮 -->
	<div class="preview-box">
		<div class="preview-header">
			<div class="preview-title">预览</div>
			<button onclick="generateImage()">生成</button>
		</div>
		<div id="previewHtml"></div>
	</div>
</div>

<script>
	const mdInput = document.getElementById('mdInput');
	const previewDiv = document.getElementById('previewHtml');

	/**
	 * 实时预览 Markdown to HTML
	 */
	mdInput.addEventListener('input', () => {
		const mdText = mdInput.value;
		try {
			previewDiv.innerHTML = marked.parse(mdText || '');
		} catch (error) {
			eda.sys_Message.showToastMessage('Markdown解析出错:' + error, 'error');
		}
	});

	/** 用于防止重复注册鼠标事件的唯一 ID */
	const MOUSE_EVENT_ID = 'docs-tools-markdown-place';

	/**
	 * 点击按钮：生成多边形数据，隐藏窗口，等待用户在画布上点击放置
	 */
	async function generateImage() {
		if (!previewDiv.innerHTML.trim()) {
			eda.sys_Message.showToastMessage('请先输入有效的Markdown语法', 'warn');
			return;
		}
		try {
			// 克隆一个隐藏副本，用于渲染（避免截到滚动条）
			const clone = previewDiv.cloneNode(true);
			clone.style.overflow = 'visible';
			clone.style.maxHeight = 'none';
			clone.style.position = 'absolute';
			clone.style.left = '-9999px';
			document.body.appendChild(clone);
			// 将 DOM 转换为 Canvas
			const canvas = await html2canvas(clone, { backgroundColor: null });
			document.body.removeChild(clone);
			// 转换为 PNG Blob
			canvas.toBlob(async (pngBlob) => {
				// 调用 PCB_MathPolygon API
				const polygon = await eda.pcb_MathPolygon.convertImageToComplexPolygon(
					pngBlob,
					canvas.width,
					canvas.height,
					0.45,
				);
				const width = canvas.width;
				const height = canvas.height;

				// 隐藏 iframe，让用户可以点击画布
				await eda.sys_IFrame.hideIFrame();
				eda.sys_Message.showToastMessage('请在画布上点击要放置的位置', 'info');

				// 注册一次性鼠标事件，等待用户点击
				if (eda.pcb_Event.isEventListenerAlreadyExist(MOUSE_EVENT_ID)) {
					eda.pcb_Event.removeEventListener(MOUSE_EVENT_ID);
				}
				eda.pcb_Event.addMouseEventListener(
					MOUSE_EVENT_ID,
					'all',
					async () => {
						try {
							const pos = await eda.pcb_SelectControl.getCurrentMousePosition();
							if (!pos) {
								eda.sys_Message.showToastMessage('无法获取鼠标位置', 'error');
								await eda.sys_IFrame.showIFrame();
								return;
							}
							await eda.pcb_PrimitiveImage.create(
								pos.x, pos.y,
								polygon,
								EPCB_LayerId.DOCUMENT,
								width,
								height,
							);
							eda.sys_Message.showToastMessage('放置成功', 'success');
						} catch (err) {
							eda.sys_Message.showToastMessage('图元创建异常:' + err, 'error');
						}
						// 放置完成后重新显示 iframe
						await eda.sys_IFrame.showIFrame();
					},
					true, // onlyOnce
				);
			}, 'image/png');
		} catch (err) {
			eda.sys_Message.showToastMessage('生成失败:' + err, 'error');
			await eda.sys_IFrame.showIFrame();
		}
	}
</script>
</body>
</html>
